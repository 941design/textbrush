name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: textbrush-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: textbrush-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: textbrush-linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build release
        run: |
          uv sync
          cargo tauri build --target ${{ matrix.target }}

      - name: Package macOS
        if: startsWith(matrix.os, 'macos')
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/macos
          tar -czf ${{ matrix.asset_name }}.tar.gz *.app
          shasum -a 256 ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
          mv ${{ matrix.asset_name }}.tar.gz* ../../../../../..

          cd ../dmg
          DMG_FILE=$(ls *.dmg)
          shasum -a 256 "$DMG_FILE" > "$DMG_FILE.sha256"
          mv "$DMG_FILE" "$DMG_FILE.sha256" ../../../../../..

      - name: Package Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd src-tauri/target/${{ matrix.target }}/release
          tar -czf ${{ matrix.asset_name }}.tar.gz textbrush
          sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
          mv ${{ matrix.asset_name }}.tar.gz* ../../../../..

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.tar.gz.sha256
            *.dmg
            *.dmg.sha256
          body: |
            ## Installation

            ### macOS
            1. Download `Textbrush_x.y.z_aarch64.dmg` (Apple Silicon) or `Textbrush_x.y.z_x64.dmg` (Intel)
            2. Open the .dmg and drag Textbrush to Applications
            3. Run `xattr -cr /Applications/Textbrush.app` to bypass Gatekeeper
            4. Launch the app or use CLI: `/Applications/Textbrush.app/Contents/MacOS/textbrush --prompt "Your prompt"`

            Alternative: Download the .tar.gz and extract manually.

            ### Linux
            1. Download `textbrush-linux-x64.tar.gz`
            2. Extract: `tar -xzf textbrush-linux-x64.tar.gz`
            3. Run: `./textbrush --prompt "Your prompt"`

            ## Verification
            Verify downloads with the provided .sha256 checksums.
          draft: true
