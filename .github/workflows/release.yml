name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: textbrush-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: textbrush-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: textbrush-linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Build release
        run: |
          uv sync
          cd src-tauri
          cargo build --target ${{ matrix.target }} --release

      - name: Package macOS
        if: startsWith(matrix.os, 'macos')
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/macos
          tar -czf ${{ matrix.asset_name }}.tar.gz *.app
          shasum -a 256 ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
          mv ${{ matrix.asset_name }}.tar.gz* ../../../../..

      - name: Package Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd src-tauri/target/${{ matrix.target }}/release
          tar -czf ${{ matrix.asset_name }}.tar.gz textbrush
          sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
          mv ${{ matrix.asset_name }}.tar.gz* ../../../../..

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.tar.gz.sha256
          body: |
            ## Installation

            ### macOS
            1. Download `textbrush-macos-arm64.tar.gz` (Apple Silicon) or `textbrush-macos-x64.tar.gz` (Intel)
            2. Extract and move to Applications
            3. Run `xattr -cr /Applications/Textbrush.app` to bypass Gatekeeper
            4. Launch the app or use CLI: `/Applications/Textbrush.app/Contents/MacOS/textbrush --prompt "Your prompt"`

            ### Linux
            1. Download `textbrush-linux-x64.tar.gz`
            2. Extract: `tar -xzf textbrush-linux-x64.tar.gz`
            3. Run: `./textbrush --prompt "Your prompt"`

            ## Verification
            Verify downloads with the provided .sha256 checksums.
          draft: true
