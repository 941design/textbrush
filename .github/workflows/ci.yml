name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint Python
        run: uv run ruff check textbrush tests

      - name: Format check Python
        run: uv run ruff format --check textbrush tests

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run fast tests
        run: uv run pytest -m "not slow and not integration" --tb=short

  test-e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run E2E smoke tests (fast only)
        run: uv run pytest -m "e2e_smoke and not slow" --tb=short

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Build Rust
        working-directory: src-tauri
        run: cargo build

      - name: Test Rust
        working-directory: src-tauri
        run: cargo test

  build:
    needs: [lint, test-python, test-e2e-smoke, test-rust]
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: uv sync

      - name: Build Tauri app
        run: |
          cd src-tauri
          cargo build --target ${{ matrix.target }} --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: textbrush-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/textbrush
            src-tauri/target/${{ matrix.target }}/release/bundle/
