<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Textbrush</title>
    <link rel="stylesheet" href="/styles/variables.css" />
    <link rel="stylesheet" href="/styles/animations.css" />
    <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>
    <main id="app">
        <!-- Header Section with Config Controls -->
        <header class="header-bar">
            <div class="config-controls">
                <!-- Row 1: Prompt -->
                <div class="header-row header-row-1">
                    <div class="prompt-control">
                        <input
                            type="text"
                            class="prompt-input"
                            id="prompt-input"
                            placeholder="Enter generation prompt"
                            title="Generation prompt"
                            aria-label="Generation prompt"
                            autocorrect="off"
                            autocapitalize="off"
                            spellcheck="false"
                        />
                    </div>
                </div>
                <!-- Row 2: Aspect Ratio + Dimensions -->
                <div class="header-row header-row-2">
                    <div class="aspect-ratio-control">
                        <div class="aspect-ratio-group">
                            <label class="radio-label" title="Square">
                                <input type="radio" name="aspect-ratio" value="1:1" checked />
                                <span>1:1</span>
                            </label>
                            <label class="radio-label" title="Landscape">
                                <input type="radio" name="aspect-ratio" value="16:9" />
                                <span>16:9</span>
                            </label>
                            <label class="radio-label" title="Wide">
                                <input type="radio" name="aspect-ratio" value="3:1" />
                                <span>3:1</span>
                            </label>
                            <label class="radio-label" title="Ultra-wide">
                                <input type="radio" name="aspect-ratio" value="4:1" />
                                <span>4:1</span>
                            </label>
                            <label class="radio-label" title="Portrait">
                                <input type="radio" name="aspect-ratio" value="4:5" />
                                <span>4:5</span>
                            </label>
                            <label class="radio-label" title="Story">
                                <input type="radio" name="aspect-ratio" value="9:16" />
                                <span>9:16</span>
                            </label>
                        </div>
                    </div>
                    <div class="resolution-control">
                        <div class="resolution-group">
                            <button
                                type="button"
                                class="resolution-btn"
                                id="resolution-decrease"
                                title="Decrease resolution"
                                aria-label="Decrease resolution"
                            >−</button>
                            <span class="dimension-display" id="dimension-display">256×256</span>
                            <button
                                type="button"
                                class="resolution-btn"
                                id="resolution-increase"
                                title="Increase resolution"
                                aria-label="Increase resolution"
                            >+</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="validation-error hidden" id="validation-error" role="alert" aria-live="polite"></div>
        </header>

        <!-- Image Viewer Section -->
        <section class="viewer">
            <div class="image-panel">
                <div class="image-container">
                    <img
                        class="current-image"
                        id="current-image"
                        src=""
                        alt="Generated image"
                        title="Generated image preview"
                    />
                    <div class="loading-overlay hidden" id="loading-overlay" aria-live="polite">
                        <div class="spinner" aria-hidden="true"></div>
                        <div class="loading-caption" id="loading-caption">
                            <span class="loading-label">generating:</span>
                            <span class="loading-prompt" id="loading-prompt"></span>
                        </div>
                    </div>
                </div>
                <!-- Navigation Dots (under image) -->
                <div class="nav-indicator" id="nav-indicator" role="status" aria-label="Image navigation">
                    <div class="nav-dots" id="nav-dots"></div>
                </div>
            </div>
            <aside class="metadata-panel" id="metadata-panel">
                <h2 class="metadata-title">Image Details</h2>
                <dl class="metadata-fields">
                    <dt class="metadata-label">Prompt:</dt>
                    <dd class="metadata-value" id="metadata-prompt">—</dd>

                    <dt class="metadata-label">Model:</dt>
                    <dd class="metadata-value" id="metadata-model">—</dd>

                    <dt class="metadata-label">Seed:</dt>
                    <dd class="metadata-value" id="metadata-seed">—</dd>

                    <dt class="metadata-label">Generated Size:</dt>
                    <dd class="metadata-value" id="metadata-generated-size">—</dd>

                    <dt class="metadata-label">Final Size:</dt>
                    <dd class="metadata-value" id="metadata-final-size">—</dd>

                    <dt class="metadata-label">Path:</dt>
                    <dd class="metadata-value metadata-path" id="metadata-path" title="Click to copy path">—</dd>
                </dl>
            </aside>
        </section>

        <!-- Status Bar -->
        <section class="status-bar">
            <div class="status-left">
                <div class="buffer-indicator" id="buffer-indicator">
                    <div class="buffer-dots" id="buffer-dots" role="status" aria-label="Buffer status">
                        <span class="buffer-dot" aria-label="Buffer slot 1"></span>
                        <span class="buffer-dot" aria-label="Buffer slot 2"></span>
                        <span class="buffer-dot" aria-label="Buffer slot 3"></span>
                        <span class="buffer-dot" aria-label="Buffer slot 4"></span>
                        <span class="buffer-dot" aria-label="Buffer slot 5"></span>
                        <span class="buffer-dot" aria-label="Buffer slot 6"></span>
                        <span class="buffer-dot" aria-label="Buffer slot 7"></span>
                        <span class="buffer-dot" aria-label="Buffer slot 8"></span>
                    </div>
                    <div class="buffer-text" id="buffer-text">0/8</div>
                </div>
                <div class="output-path-display" id="output-path-display" title="Output directory">
                    path: —
                </div>
                <div class="prompt-display" id="prompt-display" style="display: none;" title="Generation prompt">
                    Ready for generation
                </div>
            </div>
        </section>

        <!-- Controls Section -->
        <section class="controls">
            <button
                class="control-btn btn-abort"
                id="abort-btn"
                type="button"
                title="Abort generation and discard all images (Esc)"
                aria-label="Abort generation"
            >
                <span class="btn-icon" aria-hidden="true">⊘</span>
                <span class="btn-label">Abort</span>
                <span class="btn-shortcut">Esc</span>
            </button>
            <button
                class="control-btn btn-pause"
                id="pause-btn"
                type="button"
                title="Pause/Resume image generation (P)"
                aria-label="Pause or resume generation"
            >
                <span class="btn-icon" id="pause-icon" aria-hidden="true">⏸</span>
                <span class="btn-label" id="pause-label">Pause</span>
                <span class="btn-shortcut">P</span>
            </button>
            <button
                class="control-btn btn-skip"
                id="skip-btn"
                type="button"
                title="Navigate forward (→ or Space), go back (←)"
                aria-label="Skip to next image"
            >
                <span class="btn-icon" aria-hidden="true">↔</span>
                <span class="btn-label">Navigate</span>
                <span class="btn-shortcut">← / → / Space</span>
            </button>
            <button
                class="control-btn btn-accept"
                id="accept-btn"
                type="button"
                title="Accept and save current image (Enter)"
                aria-label="Accept and save current image"
            >
                <span class="btn-icon" aria-hidden="true">✓</span>
                <span class="btn-label">Accept</span>
                <span class="btn-shortcut">Enter</span>
            </button>
            <button
                class="theme-toggle"
                id="theme-toggle"
                type="button"
                title="Toggle light/dark theme"
                aria-label="Toggle theme"
            >
                <span class="theme-icon" aria-hidden="true">◐</span>
            </button>
            <div class="font-size-control">
                <div class="font-size-group" id="font-size-group" role="radiogroup" aria-label="Font size">
                    <label class="radio-label font-size-option" title="Small text">
                        <input type="radio" name="font-size" value="small" />
                        <span>S</span>
                    </label>
                    <label class="radio-label font-size-option" title="Medium text">
                        <input type="radio" name="font-size" value="medium" checked />
                        <span>M</span>
                    </label>
                    <label class="radio-label font-size-option" title="Large text">
                        <input type="radio" name="font-size" value="large" />
                        <span>L</span>
                    </label>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="/bundle.js"></script>
</body>
</html>
